<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="CSS/reset.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/responsive.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <!--
    La problemática de la clase 09 consiste en crear una página de suscripción a un diario online.
    Crear un nuevo archivo html (o utilizar el desarrollado para el 1er parcial) que mantenga la estética del
    diario, su cabecera y pie de página, y que contenga un formulario de suscripción para lectores.
    El formulario debe contener los siguientes campos: Nombre completo, email, contraseña, repetir contraseña,
    edad, teléfono, dirección, ciudad, código postal y DNI. Además debe contar con un botón “Enviar”.
    El diseño debe ser responsive, de modo que si se visualiza el formulario desde un celular se deben mostrar los
    campos uno abajo del otro, pero si se ve desde un monitor de PC los campos se deben mostrar separados en dos
    columnas, con el botón enviar solo al final del formulario y centrado en medio de las dos columnas.

Se debe validar cada campo y mostrar un mensaje de error descriptivo abajo del campo que falló.
Realizar las siguientes validaciones:

    Nombre completo: Debe tener más de 6 letras y al menos un espacio entre medio.
    Email: debe tener un formato de email válido.
    Contraseña: Al menos 8 caracteres, formados por letras y números.
    Edad: Número entero mayor o igual a 18.
    Teléfono: Número de al menos 7 dígitos, no aceptar espacios, guiones ni paréntesis.
    Dirección: Al menos 5 caracteres, con letras, números y un espacio en el medio.
    Ciudad: Al menos 3 caracteres.
    Código Postal: Al menos 3 caracteres.
    DNI: Número de 7 u 8 dígitos.


La validación de cada campo se debe realizar en el evento “blur” de cada uno de los campos.
Además, si algún campo tiene un error de validación, en el evento “focus” de dicho campo debe desaparecer el
mensaje porque se asume que el usuario está corrigiendo el error.

Al presionar el botón “Enviar” se debe mostrar un cartel emergente con la información cargada en el
formulario en caso de que haya pasado todas las validaciones. Si alguna validación no pasó, además de mostrar
el error debajo del campo, también se debe mostrar el error en el cartel emergente.
    -->

    <header>
        <h1>Diario Online</h1>
    </header>
    <main>
        <h1 id="formTitle">HOLA</h1>
        <h2>Suscripción</h2>
        <form id="subscriptionForm">
            <div class="form-group">
                <label for="fullName">Nombre completo:</label>
                <input type="text" id="fullName" name="fullName">
                <div class="error-message" id="fullNameError"></div>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <div class="error-message" id="emailError"></div>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password">
                <div class="error-message" id="passwordError"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Repetir contraseña:</label>
                <input type="password" id="confirmPassword" name="confirmPassword">
                <div class="error-message" id="confirmPasswordError"></div>
            </div>
            <div class="form-group">
                <label for="age">Edad:</label>
                <input type="number" id="age" name="age">
                <div class="error-message" id="ageError"></div>
            </div>
            <div class="form-group">
                <label for="phone">Teléfono:</label>
                <input type="text" id="phone" name="phone">
                <div class="error-message" id="phoneError"></div>
            </div>
            <div class="form-group">
                <label for="address">Dirección:</label>
                <input type="text" id="address" name="address">
                <div class="error-message" id="addressError"></div>
            </div>
            <div class="form-group">
                <label for="city">Ciudad:</label>
                <input type="text" id="city" name="city">
                <div class="error-message" id="cityError"></div>
            </div>
            <div class="form-group">
                <label for="postalCode">Código Postal:</label>
                <input type="text" id="postalCode" name="postalCode">
                <div class="error-message" id="postalCodeError"></div>
            </div>
            <div class="form-group">
                <label for="dni">DNI:</label>
                <input type="text" id="dni" name="dni">
                <div class="error-message" id="dniError"></div>
            </div>
            <div class="form-group submit-group">
                <button type="submit">Enviar</button>
            </div>
        </form>
    </main>
    
    <div id="customModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">Título</h3>
            <p id="modalMessage"></p>
            <button id="closeModalBtn">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
